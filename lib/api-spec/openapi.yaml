openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Debit Card Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: cards
    description: Card management
  - name: transactions
    description: Transaction history
  - name: notifications
    description: Notification management
  - name: shipping
    description: Shipping management
  - name: support
    description: Support tickets

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile:
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/change-password:
    post:
      operationId: changePassword
      tags: [users]
      summary: Change user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated or wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards:
    get:
      operationId: getCards
      tags: [cards]
      summary: Get all cards for the current user
      responses:
        "200":
          description: List of cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Card"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCard
      tags: [cards]
      summary: Create a new debit card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCardRequest"
      responses:
        "201":
          description: Card created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}:
    get:
      operationId: getCard
      tags: [cards]
      summary: Get a specific card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Card details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCard
      tags: [cards]
      summary: Delete a card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Card deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/topup:
    post:
      operationId: topUpCard
      tags: [cards]
      summary: Top up a card balance
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopUpRequest"
      responses:
        "200":
          description: Top-up successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/freeze:
    post:
      operationId: freezeCard
      tags: [cards]
      summary: Freeze or unfreeze a card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreezeCardRequest"
      responses:
        "200":
          description: Card status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/pin:
    put:
      operationId: updateCardPin
      tags: [cards]
      summary: Update card PIN
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardPinRequest"
      responses:
        "200":
          description: PIN updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/access-url:
    post:
      operationId: createCardAccessUrl
      tags: [cards]
      summary: Create a secure access URL for card details
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Access URL created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardAccessUrlResponse"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/balance-history:
    get:
      operationId: getCardBalanceHistory
      tags: [cards]
      summary: Get balance history for a card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Balance history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/contacts:
    put:
      operationId: updateCardContacts
      tags: [cards]
      summary: Update contact information for a card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardContactsRequest"
      responses:
        "200":
          description: Contacts updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateContactsResult"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/telegram:
    get:
      operationId: getCardTelegram
      tags: [cards]
      summary: Get Telegram link status for a card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Telegram link status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramLinkResponse"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/telegram/link:
    post:
      operationId: linkTelegram
      tags: [cards]
      summary: Link a Telegram account to a card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkTelegramRequest"
      responses:
        "201":
          description: Telegram linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramLinkResponse"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/telegram/unlink:
    post:
      operationId: unlinkTelegram
      tags: [cards]
      summary: Unlink Telegram account from a card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Telegram unlinked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramLinkResponse"
        "404":
          description: Card not found or not linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/details-with-transactions:
    get:
      operationId: getCardDetailsWithTransactions
      tags: [cards]
      summary: Get card details with transactions
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Card details with transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardDetailsWithTransactions"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/transactions:
    get:
      operationId: getCardTransactions
      tags: [transactions]
      summary: Get transactions for a specific card
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions:
    get:
      operationId: getAllTransactions
      tags: [transactions]
      summary: Get all transactions for the current user
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/{cardId}/activate:
    put:
      operationId: activatePhysicalCard
      tags: [cards]
      summary: Activate a physical card with an activation code
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateCardRequest"
      responses:
        "200":
          description: Card activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "400":
          description: Invalid activation code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get all notifications for the current user
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/mark-all-read:
    put:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/{notificationId}/read:
    put:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/settings:
    get:
      operationId: getNotificationSettings
      tags: [notifications]
      summary: Get notification preferences
      responses:
        "200":
          description: Notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateNotificationSettings
      tags: [notifications]
      summary: Update notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationSettingsRequest"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shipping:
    get:
      operationId: getShippingRequests
      tags: [shipping]
      summary: Get shipping requests for the current user
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [in_review, dispatched, shipped, delivered, cancelled]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of shipping requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShippingListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createShippingRequest
      tags: [shipping]
      summary: Create a shipping request for a physical card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShippingRequest"
      responses:
        "201":
          description: Shipping request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShippingRequest"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /support/tickets:
    get:
      operationId: getSupportTickets
      tags: [support]
      summary: Get all support tickets for the current user
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Create a support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportTicketRequest"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 4
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
      required:
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - createdAt

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        country:
          type: string

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
      required:
        - currentPassword
        - newPassword

    Card:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [virtual, physical]
          default: virtual
        cardNumber:
          type: string
        cardholderName:
          type: string
        expiryMonth:
          type: integer
        expiryYear:
          type: integer
        cvv:
          type: string
        balance:
          type: number
          format: double
        currency:
          type: string
        status:
          type: string
          enum: [active, frozen, expired, cancelled, pending_activation]
        label:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - cardNumber
        - cardholderName
        - expiryMonth
        - expiryYear
        - cvv
        - balance
        - currency
        - status
        - createdAt

    UpdateCardContactsRequest:
      type: object
      properties:
        email:
          type: string
        phoneNumber:
          type: string
        phoneDialCode:
          type: string
        applyToAll:
          type: boolean
          default: false
      required:
        - email
        - phoneNumber

    UpdateContactsResult:
      type: object
      properties:
        message:
          type: string
        updatedCount:
          type: integer
      required:
        - message
        - updatedCount

    TelegramLinkResponse:
      type: object
      properties:
        linked:
          type: boolean
        telegramLink:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            cardId:
              type: integer
            telegramId:
              type: string
            telegramUsername:
              type: string
              nullable: true
            telegramFirstName:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
      required:
        - linked

    LinkTelegramRequest:
      type: object
      properties:
        telegramId:
          type: string
        telegramUsername:
          type: string
        telegramFirstName:
          type: string
      required:
        - telegramId

    CardDetailsWithTransactions:
      type: object
      properties:
        card:
          $ref: "#/components/schemas/Card"
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
      required:
        - card
        - transactions

    CreateCardRequest:
      type: object
      properties:
        label:
          type: string
        currency:
          type: string
          default: "EUR"
        color:
          type: string
        type:
          type: string
          enum:
            - virtual
            - physical
          default: "virtual"
      required: []

    TopUpRequest:
      type: object
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
        description:
          type: string
      required:
        - amount

    FreezeCardRequest:
      type: object
      properties:
        frozen:
          type: boolean
      required:
        - frozen

    Transaction:
      type: object
      properties:
        id:
          type: integer
        cardId:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [topup, payment, refund, fee]
        amount:
          type: number
          format: double
        balanceBefore:
          type: number
          format: double
        balanceAfter:
          type: number
          format: double
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, completed, failed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - cardId
        - userId
        - type
        - amount
        - balanceBefore
        - balanceAfter
        - status
        - createdAt

    SupportTicket:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        subject:
