kind = "web"
previewPath = "/"
title = "Card Manager"
version = "1.0.0"
id = "artifacts/card-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23912
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/card-manager run dev"

[services.env]
PORT = "23912"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/card-manager", "run", "build"]
publicDir = "artifacts/card-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
